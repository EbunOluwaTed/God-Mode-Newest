      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.1); }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }

      }
